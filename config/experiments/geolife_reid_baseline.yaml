# Baseline reidentification on unprotected Geolife (design §8, no protection).
# Real Geolife needs a Microsoft licence; drop the .plt tree at dataset.path to run.
experiment:
  id: geolife_reid_baseline
  seed: 42
  output_dir: results/geolife_reid_baseline

map:
  source: osm
  region: beijing            # must equal the Geolife native region (orchestrator enforces)
  bbox: [116.20, 39.75, 116.55, 40.05]
  crs: EPSG:32650

dataset:
  id: geolife
  path: data/raw/geolife
  native_region: beijing

cleaning:
  max_speed_kmh: 200
  min_points: 20
  min_length_m: 500
  resample_s: 5

map_matching:
  matcher: leuven            # fmm is the eventual production matcher (design §8); leuven now
  k_candidates: 8
  radius_m: 50
  gps_error_m: 20
  min_match_score: 0.6

split:
  scheme: by_user
  fractions: {train: 0.5, test: 0.2, shadow: 0.2, attack: 0.1}

privacy_mechanisms:
  - id: none

attacks:
  - type: reidentification
    attacker:
      known_points: [3, 5, 10]   # points the attacker knows about each target
      distance: dtw
    target_scope: [raw, protected]

metrics:
  privacy: [top1_acc, topk_acc, linkage_rate]
  top_k: 5
  bootstrap: {n: 1000, ci: 0.95}

reporting:
  export: [csv]
